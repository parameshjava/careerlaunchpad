<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline — CareerLaunchpad</title>
    <style>
      :root { color-scheme: light; }
      * { box-sizing: border-box; margin: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f6f8fb;
        color: #1a1a2e;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 420px;
        background: #fff;
        border: 1px solid #eef0f4;
        border-radius: 16px;
        padding: 32px 28px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }
      img { width: 72px; height: 72px; margin: 0 auto 16px; display: block; }
      h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em; }
      p { margin-top: 10px; color: #475569; line-height: 1.55; }
      button {
        margin-top: 20px;
        border: 0;
        cursor: pointer;
        color: #fff;
        font-weight: 600;
        font-size: 0.95rem;
        padding: 10px 18px;
        border-radius: 10px;
        background: linear-gradient(90deg, #2563eb, #7c3aed);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/icons/icon-192.png" alt="CareerLaunchpad" />
      <h1>You're offline</h1>
      <p>We couldn't reach CareerLaunchpad. Check your connection and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
