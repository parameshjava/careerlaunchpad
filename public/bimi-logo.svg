<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.2" baseProfile="tiny-ps" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <title>CareerLaunchPad</title>
  <defs>
    <linearGradient id="ring" x1="120" y1="104" x2="396" y2="430" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1f6fd0"/>
      <stop offset="1" stop-color="#1ba23a"/>
    </linearGradient>
  </defs>

  <!-- Solid canvas: BIMI renders the mark clipped to a circle; a non-transparent
       background keeps it crisp across mail clients. -->
  <rect width="512" height="512" fill="#ffffff"/>

  <!-- Brand ring: blue (top-left) sweeping to green (bottom-right), matching the
       CareerLaunchPad badge. -->
  <circle cx="256" cy="256" r="170" fill="#ffffff" stroke="url(#ring)" stroke-width="44"/>

  <!-- Open book = education / learning. -->
  <path d="M256 326 C226 310 190 310 168 322 L168 372 C190 360 226 360 256 378 C286 360 322 360 344 372 L344 322 C322 310 286 310 256 326 Z" fill="#1657b0"/>
  <path d="M256 326 L256 378" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>

  <!-- Rising arrow = launch / career growth. -->
  <g fill="none" stroke="#1ba23a" stroke-width="44" stroke-linecap="round" stroke-linejoin="round">
    <path d="M196 300 L330 166"/>
    <path d="M270 166 L330 166 L330 226"/>
  </g>
</svg>
